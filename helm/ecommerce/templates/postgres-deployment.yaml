apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: {{ .Values.postgres.image }}
        ports:
        - containerPort: 5432

        env:
        - name: POSTGRES_DB
          value: {{ .Values.db.name }}

        - name: POSTGRES_USER
          value: {{ .Values.db.user }}

        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ecommerce-secret
              key: DB_PASSWORD

        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data

        - name: init-script
          mountPath: /docker-entrypoint-initdb.d

      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc

      - name: init-script
        configMap:
          name: ecommerce-config